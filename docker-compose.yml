# Development stack: hot-reload backend + Vite dev server + MongoDB.
# Usage: docker compose up --build
services:
  mongo:
    image: mongo:8
    container_name: certificampus-mongo-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-certificampus}
    volumes:
      - mongo_data:/data/db

    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: build
    container_name: certificampus-backend-dev
    restart: unless-stopped
    command: npm run dev
    environment:
      NODE_ENV: development
      PORT: 4000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:4000}
      MONGO_URI: ${MONGO_URI}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      SPARKPOST_API_KEY: ${SPARKPOST_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@certificampus.app}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-CertifiCampus}
      DIPLOMA_DIR: storage/diplomas
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
      - backend_storage:/app/storage
    ports:
      - "5002:4000"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: certificampus-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5001:5173"
    depends_on:
      - backend

volumes:
  mongo_data:
  backend_storage:
