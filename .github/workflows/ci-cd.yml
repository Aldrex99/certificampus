name: CI/CD

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # 1. Automated tests + static checks (runs on every push and PR).
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Test
        run: npm test --if-present
        env:
          NODE_ENV: test

  # 2. Build and push Docker images (only on push to dev / main).
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Registry repository names must be lowercase.
      - name: Lowercase image prefix
        id: img
        run: echo "prefix=${IMAGE_PREFIX,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN  }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.prefix }}-${{ matrix.service }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ steps.img.outputs.prefix }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # 3. Deploy to the Debian VPS over SSH.
  #    dev branch  -> dev environment
  #    main branch -> production environment
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    environment: ${{ github.ref_name == 'main' && 'production' || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      # Registry repository names must be lowercase.
      - name: Lowercase image prefix
        id: img
        run: echo "prefix=${IMAGE_PREFIX,,}" >> "$GITHUB_OUTPUT"

      # Build the .env from GitHub Actions secrets/variables for this environment.
      - name: Generate .env
        run: |
          cat > .env <<EOF
          REGISTRY=${{ env.REGISTRY }}/${{ steps.img.outputs.prefix }}
          IMAGE_TAG=${{ github.sha }}
          FRONTEND_PORT=${{ vars.FRONTEND_PORT }}
          BACKEND_PORT=${{ vars.BACKEND_PORT }}

          MONGO_ROOT_USERNAME=${{ secrets.MONGO_ROOT_USERNAME }}
          MONGO_ROOT_PASSWORD=${{ secrets.MONGO_ROOT_PASSWORD }}
          MONGO_DB_NAME=${{ vars.MONGO_DB_NAME }}
          MONGO_URI=${{ secrets.MONGO_URI }}

          CLIENT_URL=${{ vars.CLIENT_URL }}
          PUBLIC_URL=${{ vars.PUBLIC_URL }}
          JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          JWT_RESET_EXPIRES_IN=${{ vars.JWT_RESET_EXPIRES_IN }}
          JWT_ACTIVATION_EXPIRES_IN=${{ vars.JWT_ACTIVATION_EXPIRES_IN }}

          SPARKPOST_API_KEY=${{ secrets.SPARKPOST_API_KEY }}
          EMAIL_FROM=${{ vars.EMAIL_FROM }}
          EMAIL_FROM_NAME=${{ vars.EMAIL_FROM_NAME }}
          EOF

      # Copy the compose file and generated .env to the VPS.
      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.prod.yml,.env"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            echo "${{ secrets.GITHUB_TOKEN  }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
